meta:
  profile: academic-paper
  figureType: workflow
  theme: academic
  layout: horizontal
  title: AI多模型辅助编辑流程
  description: 展示选区触发、服务端代理、多模型候选生成、用户确认和结果回填的流程。
  legend: AI只生成候选结果，最终写入必须经过用户确认。
modules:
  - id: editor
    label: 编辑器侧
  - id: api
    label: 服务端侧
  - id: model
    label: 模型侧
  - id: apply
    label: 回填与同步
nodes:
  - id: select
    label: 用户选中文本
    type: process
    module: editor
  - id: bubble
    label: AI操作气泡
    type: process
    module: editor
  - id: request
    label: 提交文本/操作/语言/候选数
    type: process
    module: api
  - id: proxy
    label: 服务端代理读取模型配置
    type: service
    module: api
  - id: primary
    label: 默认模型候选
    type: cloud
    module: model
  - id: secondary
    label: 备选模型候选
    type: cloud
    module: model
  - id: candidates
    label: 候选结果对比
    type: process
    module: editor
  - id: confirm
    label: 用户确认应用方式
    type: process
    module: apply
  - id: transaction
    label: 替换选区或插入下方
    type: process
    module: apply
  - id: yjs
    label: 转换为Yjs update同步
    type: service
    module: apply
edges:
  - from: select
    to: bubble
    type: primary
  - from: bubble
    to: request
    type: primary
  - from: request
    to: proxy
    type: primary
  - from: proxy
    to: primary
    type: data
  - from: proxy
    to: secondary
    type: data
  - from: primary
    to: candidates
    type: primary
  - from: secondary
    to: candidates
    type: primary
  - from: candidates
    to: confirm
    type: primary
  - from: confirm
    to: transaction
    type: primary
  - from: transaction
    to: yjs
    type: data
