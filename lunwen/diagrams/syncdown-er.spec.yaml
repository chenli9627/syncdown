meta:
  profile: academic-paper
  figureType: architecture
  theme: academic
  layout: horizontal
  title: Syncdown系统数据库E-R关系
  description: 展示用户、工作区、文档、共享关系、版本历史、更新记录和媒体资源之间的实体关系。
  legend: 箭头标签表示一对多或多对多关系的业务含义。
modules:
  - id: identity
    label: 身份与工作区
  - id: document
    label: 文档与权限
  - id: history
    label: 历史与资源
nodes:
  - id: user
    label: 用户(User)
    type: database
    module: identity
  - id: workspace
    label: 工作区(Workspace)
    type: database
    module: identity
  - id: member
    label: 工作区成员(WorkspaceMember)
    type: database
    module: identity
  - id: doc
    label: 文档(Document)
    type: database
    module: document
  - id: share
    label: 文档共享(DocumentShare)
    type: database
    module: document
  - id: version
    label: 版本快照(VersionHistory)
    type: database
    module: history
  - id: update
    label: 更新记录(UpdateHistory)
    type: database
    module: history
  - id: media
    label: 媒体资源(MediaObject)
    type: database
    module: history
edges:
  - from: user
    to: workspace
    type: primary
    label: 创建/拥有
  - from: user
    to: member
    type: data
    label: 作为成员加入
  - from: workspace
    to: member
    type: data
    label: 包含成员
  - from: workspace
    to: doc
    type: primary
    label: 包含文档
  - from: doc
    to: share
    type: data
    label: 授权guest
  - from: user
    to: share
    type: data
    label: 获得can_edit/can_view
  - from: doc
    to: version
    type: primary
    label: 产生版本快照
  - from: doc
    to: update
    type: primary
    label: 产生修改记录
  - from: user
    to: media
    type: data
    label: 上传
  - from: doc
    to: media
    type: data
    label: 正文引用
